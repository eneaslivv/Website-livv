<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #000; }
    .logo { filter: none; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #fff; }
      .logo { filter: invert(1); }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37" ry="37"/>
  <image class="logo" x="14" y="55" width="152" height="71" href="data:image/png;base64,"/>
</svg>
